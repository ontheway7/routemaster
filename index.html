<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="루트마스터">
<meta name="theme-color" content="#0d1117">
<title>루트마스터</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --card: #21262d; --border: #30363d;
  --accent: #f0b429; --accent2: #ff6b6b; --accent3: #58a6ff; --green: #3fb950;
  --text: #e6edf3; --muted: #7d8590;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:14px; }

.app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; }

/* HEADER */
.header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--bg); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
.logo { font-family:'Black Han Sans',sans-serif; font-size:1.3rem; letter-spacing:2px; color:var(--accent); }
.logo span { color:var(--text); }

/* MAP */
#map { flex:1; position:relative; background:var(--surface); min-height:0; transition:all 0.3s ease; cursor:pointer; }
#map.fullscreen { position:fixed; inset:0; z-index:100; max-width:100%; cursor:default; }
.btn-map-close { position:absolute; top:12px; right:12px; z-index:101; background:rgba(13,17,23,0.85); border:1px solid var(--border); color:var(--text); width:36px; height:36px; border-radius:50%; font-size:1rem; cursor:pointer; display:none; align-items:center; justify-content:center; }
#map.fullscreen .btn-map-close { display:flex; }
.map-empty { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; pointer-events:none; z-index:1; }
.map-empty.hide { display:none; }
.map-empty-icon { font-size:2.5rem; }
.map-empty-text { color:var(--muted); font-size:0.82rem; text-align:center; line-height:1.6; }

/* MAP STATS */
.map-stats { position:absolute; top:10px; left:10px; right:10px; background:rgba(13,17,23,0.92); backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:12px; padding:10px 14px; z-index:5; display:none; }
.map-stats.show { display:flex; gap:12px; }
.mstat { flex:1; text-align:center; }
.mstat-val { font-family:'Black Han Sans',sans-serif; font-size:1.15rem; color:var(--accent); }
.mstat-label { font-size:0.65rem; color:var(--muted); margin-top:1px; }

/* BOTTOM */
.bottom { background:var(--bg); border-top:1px solid var(--border); flex-shrink:0; overflow-y:auto; max-height:58vh; -webkit-overflow-scrolling:touch; position:relative; z-index:25; }
.handle { display:flex; justify-content:center; padding:7px; }
.handle-bar { width:34px; height:4px; background:var(--border); border-radius:2px; }

/* INPUTS */
.inputs { padding:0 16px 4px; }
.field-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.fdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.fdot.s { background:var(--green); }
.fdot.e { background:var(--accent2); }
.fline { width:2px; height:14px; background:var(--border); margin-left:4px; flex-shrink:0; }
.iw { position:relative; flex:1; }
.fi { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; }
.fi:focus { border-color:var(--accent); }
.fi::placeholder { color:var(--muted); }

/* AUTOCOMPLETE */
.ac-list { position:absolute; left:0; right:0; top:calc(100% + 4px); background:var(--card); border:1px solid var(--accent3); border-radius:10px; overflow:hidden; z-index:999; box-shadow:0 8px 24px rgba(0,0,0,0.5); display:none; }
.ac-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.15s; }
.ac-item:last-child { border-bottom:none; }
.ac-item:hover, .ac-item:active { background:var(--surface); }
.ac-name { font-weight:500; font-size:0.88rem; }
.ac-addr { font-size:0.73rem; color:var(--muted); margin-top:2px; }

/* STOPS */
.stops { padding:0 16px 2px; }
.stop-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; animation:popIn 0.2s ease; }
@keyframes popIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.sbadge { width:22px; height:22px; border-radius:50%; background:var(--card); border:1.5px solid var(--accent3); color:var(--accent3); font-size:0.7rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.btn-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:6px; flex-shrink:0; transition:color 0.2s; }
.btn-del:hover { color:var(--accent2); }

/* ADD STOP */
.btn-add { display:flex; align-items:center; gap:6px; padding:7px 16px; background:none; border:none; color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; cursor:pointer; transition:color 0.2s; }
.btn-add:hover { color:var(--accent3); }

/* LOCATION BTN */
.btn-loc { background:var(--card); border:1px solid var(--border); color:var(--accent); width:38px; height:38px; border-radius:10px; font-size:1.1rem; cursor:pointer; flex-shrink:0; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
.btn-loc:active { background:var(--surface); transform:scale(0.95); }
.btn-loc.spinning { animation:spin 0.7s linear infinite; }

/* OPTIONS */
.opts { padding:5px 16px 8px; display:flex; gap:5px; flex-wrap:wrap; }
.opt { padding:5px 11px; border:1px solid var(--border); background:var(--card); color:var(--muted); border-radius:20px; font-family:'Noto Sans KR',sans-serif; font-size:0.73rem; cursor:pointer; transition:all 0.15s; }
.opt.on { border-color:var(--accent); color:var(--accent); background:rgba(240,180,41,0.1); }

/* CTA */
.cta { padding:6px 16px 14px; }
.btn-go { width:100%; padding:13px; background:var(--accent); border:none; border-radius:12px; color:#000; font-family:'Black Han Sans',sans-serif; font-size:1.05rem; letter-spacing:2px; cursor:pointer; transition:all 0.2s; }
.btn-go:active { transform:scale(0.98); }
.btn-go:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }

/* RESULT SHEET */
.sheet { position:absolute; bottom:0; left:0; right:0; background:var(--bg); border-top:1px solid var(--border); border-radius:20px 20px 0 0; max-height:62vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index:20; padding-bottom:16px; }
.sheet.open { transform:translateY(0); }
.sheet-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 8px; }
.sheet-title { font-family:'Black Han Sans',sans-serif; font-size:1rem; color:var(--accent); letter-spacing:1px; }
.btn-close { background:var(--card); border:none; color:var(--muted); width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:0.95rem; position:relative; z-index:30; }
.rstep { display:flex; gap:12px; }
.rl { display:flex; flex-direction:column; align-items:center; width:30px; flex-shrink:0; }
.rdot { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:700; flex-shrink:0; }
.rdot.s { background:var(--green); color:#000; }
.rdot.e { background:var(--accent2); color:#fff; }
.rdot.m { background:var(--card); color:var(--accent3); border:1.5px solid var(--accent3); }
.rline { width:2px; flex:1; min-height:20px; background:linear-gradient(to bottom,var(--accent3),rgba(88,166,255,0.1)); margin:3px 0; }
.rc { flex:1; padding:3px 0 16px; }
.rc-name { font-weight:500; font-size:0.88rem; }
.rc-meta { margin-top:2px; font-size:0.73rem; color:var(--muted); }
.save-bar { margin:10px 16px 0; background:var(--card); border-radius:10px; padding:11px 14px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(240,180,41,0.2); }
.save-label { font-size:0.76rem; color:var(--muted); }
.save-val { font-family:'Black Han Sans',sans-serif; font-size:1.15rem; color:var(--accent); }
.btn-navi2 { margin:10px 16px 0; width:calc(100% - 32px); padding:12px; background:#3A1D94; border:none; border-radius:10px; color:#fff; font-family:'Black Han Sans',sans-serif; font-size:0.95rem; letter-spacing:1px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }

/* STATUS */
.status-bar { position:absolute; bottom:70px; left:16px; right:16px; background:rgba(22,27,34,0.95); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:0.78rem; color:var(--muted); z-index:10; display:none; text-align:center; }
.status-bar.show { display:block; }

/* LOADING */
.loading { position:absolute; inset:0; background:rgba(13,17,23,0.85); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:30; gap:10px; }
.loading.show { display:flex; }
.spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { color:var(--muted); font-size:0.83rem; }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">루트<span>마스터</span></div>

  </div>

  <!-- Map -->
  <div id="map">
    <div class="map-empty" id="mapEmpty">
      <div class="map-empty-icon">🗺️</div>
      <div class="map-empty-text">출발지와 경유지를 입력하고<br>경로 최적화를 실행하세요</div>
    </div>
    <button class="btn-map-close" onclick="closeMapFullscreen()">✕</button>
    <div class="map-stats" id="mapStats">
      <div class="mstat"><div class="mstat-val" id="sStops">-</div><div class="mstat-label">경유지</div></div>
      <div class="mstat"><div class="mstat-val" id="sDist">-</div><div class="mstat-label">총 거리</div></div>
      <div class="mstat"><div class="mstat-val" id="sTime">-</div><div class="mstat-label">소요시간</div></div>
      <div class="mstat"><div class="mstat-val" id="sSave">-</div><div class="mstat-label">절약</div></div>
    </div>
  </div>

  <!-- Bottom Panel -->
  <div class="bottom" id="bottom">
    <div class="handle"><div class="handle-bar"></div></div>

    <div class="inputs">
      <div class="field-row">
        <div class="fdot s"></div>
        <div class="iw">
          <input class="fi" id="fi-start" placeholder="출발지 (예: 광화문역)" autocomplete="off">
          <div class="ac-list" id="ac-start"></div>
        </div>
        <button class="btn-loc" id="btnLoc" onclick="useCurrentLocation()" title="현재 위치 사용">📍</button>
      </div>
      <div style="display:flex;padding-left:4px;margin-bottom:5px"><div class="fline"></div></div>
      <div class="field-row">
        <div class="fdot e"></div>
        <div class="iw">
          <input class="fi" id="fi-end" placeholder="도착지" autocomplete="off">
          <div class="ac-list" id="ac-end"></div>
        </div>
      </div>
    </div>

    <div class="stops" id="stopsEl"></div>
    <button class="btn-add" onclick="addStop()">＋ 경유지 추가 (최대 7개)</button>

    <div class="opts">
      <button class="opt on" id="opt-short" onclick="togOpt('short')">📏 최단거리</button>
      <button class="opt on" id="opt-traffic" onclick="togOpt('traffic')">🚦 교통반영</button>
      <button class="opt" id="opt-return" onclick="togOpt('return')">🔄 출발지복귀</button>
    </div>

    <div class="cta">
      <button class="btn-go" id="btnGo" onclick="optimize()">🔍 경로 최적화</button>
    </div>
  </div>

  <!-- Result Sheet -->
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <div class="sheet-title">최적 경로</div>
      <button class="btn-close" onclick="closeSheet()">✕</button>
    </div>
    <div id="sheetSteps" style="padding:0 16px"></div>
    <div class="save-bar" id="saveBar" style="display:none">
      <div><div class="save-label">임의 순서 대비 절약</div><div style="font-size:0.68rem;color:var(--muted);margin-top:1px">TSP 최적화 알고리즘</div></div>
      <div class="save-val" id="saveVal">-</div>
    </div>
    <button class="btn-navi2" id="btnNavi2" onclick="openKakaoNavi()" style="display:none">🧭 카카오내비로 길안내</button>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">경로 계산 중...</div>
  </div>
</div>

<script>
// ── 카카오 SDK 로드 ──
const KAKAO_KEY = '4d1307b368487f762cb7e2681ede2435';
let kakaoReady = false;
let kakaoMap = null;
let ps = null;
let geocoder = null;
let markers = [];
let polyline = null;

function loadKakaoSDK() {
  return new Promise((resolve, reject) => {
    if (window.kakao && window.kakao.maps) { resolve(); return; }
    const s = document.createElement('script');
    s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_KEY}&libraries=services&autoload=false`;
    s.onload = () => {
      kakao.maps.load(() => {
        resolve();
      });
    };
    s.onerror = () => reject(new Error('카카오 SDK 로드 실패'));
    document.head.appendChild(s);
  });
}

async function initApp() {
  document.getElementById('sheet').classList.remove('open');
  showStatus('카카오맵 로딩 중...');
  try {
    await loadKakaoSDK();
    kakaoReady = true;

    // 지도 초기화
    const container = document.getElementById('map');
    const options = { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 8 };
    kakaoMap = new kakao.maps.Map(container, options);
    ps = new kakao.maps.services.Places();
    geocoder = new kakao.maps.services.Geocoder();

    // 현재 위치로 지도 이동 + 출발지 자동 입력
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        kakaoMap.setCenter(new kakao.maps.LatLng(lat, lng));
        // 역지오코딩으로 출발지 자동 입력
        if (geocoder) {
          geocoder.coord2Address(lng, lat, (result, status) => {
            if (status === kakao.maps.services.Status.OK && result.length) {
              const addr = result[0].road_address
                ? result[0].road_address.address_name
                : result[0].address.address_name;
              document.getElementById('fi-start').value = addr;
              coords[addr] = { lat, lng };
            } else {
              document.getElementById('fi-start').value = '현재 위치';
              coords['현재 위치'] = { lat, lng };
            }
          });
        }
      });
    }

    // Kakao JS SDK 초기화
    if (window.Kakao && !Kakao.isInitialized()) {
      Kakao.init(KAKAO_KEY);
    }

    hideStatus();
    // 초기 경유지 세팅
    stops = []; sid = 0;
    document.getElementById('stopsEl').innerHTML = '';
    ['경주불국사','안동하회마을'].forEach(n => addStop(n));
    // opts 버튼 초기 동기화
    Object.keys(opts).forEach(k => {
      document.getElementById('opt-' + k).classList.toggle('on', opts[k]);
    });
    setupInputs();
  } catch(e) {
    showStatus('⚠️ 지도 로드 실패: ' + e.message);
  }
}

// ── STATUS ──
function showStatus(msg) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.classList.add('show');
}
function hideStatus() {
  document.getElementById('statusBar').classList.remove('show');
}

// ── 현재 위치 출발지 설정 ──
function useCurrentLocation() {
  const btn = document.getElementById('btnLoc');
  const input = document.getElementById('fi-start');
  if (!navigator.geolocation) { alert('위치 서비스를 사용할 수 없습니다.'); return; }
  btn.classList.add('spinning');
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      if (geocoder) {
        geocoder.coord2Address(lng, lat, (result, status) => {
          btn.classList.remove('spinning');
          btn.disabled = false;
          if (status === kakao.maps.services.Status.OK && result.length) {
            const addr = result[0].road_address
              ? result[0].road_address.address_name
              : result[0].address.address_name;
            input.value = addr;
            coords[addr] = { lat, lng };
          } else {
            input.value = '현재 위치';
            coords['현재 위치'] = { lat, lng };
          }
        });
      } else {
        btn.classList.remove('spinning');
        btn.disabled = false;
        input.value = '현재 위치';
        coords['현재 위치'] = { lat, lng };
      }
    },
    err => {
      btn.classList.remove('spinning');
      btn.disabled = false;
      alert('위치를 가져올 수 없습니다: ' + err.message);
    },
    { enableHighAccuracy: false, timeout: 5000 }
  );
}

// ── INPUT AUTOCOMPLETE ──
let acTimers = {};
let coords = {};

function setupInputs() {
  setupAC('fi-start', 'ac-start');
  setupAC('fi-end', 'ac-end');
}

function setupAC(inputId, acId) {
  const input = document.getElementById(inputId);
  const acEl = document.getElementById(acId);
  let isComposing = false;

  input.addEventListener('compositionstart', () => { isComposing = true; });
  input.addEventListener('compositionend', () => {
    isComposing = false;
    clearTimeout(acTimers[inputId]);
    const val = input.value.trim();
    if (val.length < 2) { acEl.style.display = 'none'; return; }
    acTimers[inputId] = setTimeout(() => doSearch(val, acEl, input), 250);
  });
  input.addEventListener('input', () => {
    if (isComposing) return;
    clearTimeout(acTimers[inputId]);
    const val = input.value.trim();
    if (val.length < 2) { acEl.style.display = 'none'; return; }
    acTimers[inputId] = setTimeout(() => doSearch(val, acEl, input), 250);
  });
  input.addEventListener('blur', () => {
    setTimeout(() => { acEl.style.display = 'none'; }, 200);
  });
}

function doSearch(query, acEl, input) {
  if (!ps) return;
  ps.keywordSearch(query, (data, status) => {
    if (status !== kakao.maps.services.Status.OK || !data.length) {
      acEl.style.display = 'none';
      return;
    }
    acEl.innerHTML = '';
    data.slice(0, 5).forEach(p => {
      const item = document.createElement('div');
      item.className = 'ac-item';
      item.innerHTML = `<div class="ac-name">${p.place_name}</div><div class="ac-addr">${p.road_address_name || p.address_name}</div>`;
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = p.place_name;
        coords[p.place_name] = { lat: parseFloat(p.y), lng: parseFloat(p.x) };
        acEl.style.display = 'none';
      });
      acEl.appendChild(item);
    });
    acEl.style.display = 'block';
  });
}

// ── STOPS ──
let stops = [];
let sid = 0;

function addStop(name = '') {
  if (stops.length >= 7) { alert('최대 7개'); return; }
  const id = ++sid;
  stops.push({ id, name });
  renderStops();
}

function removeStop(id) {
  stops = stops.filter(s => s.id !== id);
  renderStops();
}

function renderStops() {
  const c = document.getElementById('stopsEl');
  c.innerHTML = '';
  stops.forEach((stop, i) => {
    const div = document.createElement('div');
    div.className = 'stop-row';
    const acId = `ac-s${stop.id}`;
    div.innerHTML = `
      <div class="sbadge">${i+1}</div>
      <div class="iw" style="flex:1">
        <input class="fi" id="fi-s${stop.id}" value="${stop.name}" placeholder="경유지 ${i+1}" autocomplete="off">
        <div class="ac-list" id="${acId}"></div>
      </div>
      <button class="btn-del" onclick="removeStop(${stop.id})">✕</button>
    `;
    c.appendChild(div);

    const input = div.querySelector(`#fi-s${stop.id}`);
    const acEl = div.querySelector(`#${acId}`);
    let isComposing = false;
    input.addEventListener('compositionstart', () => { isComposing = true; });
    input.addEventListener('compositionend', () => {
      isComposing = false;
      stops[i].name = input.value;
      clearTimeout(acTimers[stop.id]);
      const val = input.value.trim();
      if (val.length < 2) { acEl.style.display = 'none'; return; }
      acTimers[stop.id] = setTimeout(() => doSearch(val, acEl, input), 250);
    });
    input.addEventListener('input', () => {
      if (isComposing) return;
      stops[i].name = input.value;
      clearTimeout(acTimers[stop.id]);
      const val = input.value.trim();
      if (val.length < 2) { acEl.style.display = 'none'; return; }
      acTimers[stop.id] = setTimeout(() => doSearch(val, acEl, input), 250);
    });
    input.addEventListener('blur', () => {
      setTimeout(() => { acEl.style.display = 'none'; }, 200);
    });
  });
}

// ── OPTIONS ──
let opts = { short: true, traffic: true, return: false };
function togOpt(k) {
  opts[k] = !opts[k];
  document.getElementById('opt-' + k).classList.toggle('on', opts[k]);
}

// ── MODE ──
// (단일 모드)

// ── GEOCODING ──
function getCoords(name) {
  if (coords[name]) return Promise.resolve(coords[name]);
  return new Promise(resolve => {
    ps.keywordSearch(name, (data, status) => {
      if (status === kakao.maps.services.Status.OK && data.length) {
        const c = { lat: parseFloat(data[0].y), lng: parseFloat(data[0].x) };
        coords[name] = c;
        resolve(c);
      } else {
        geocoder.addressSearch(name, (d, s2) => {
          if (s2 === kakao.maps.services.Status.OK && d.length) {
            const c = { lat: parseFloat(d[0].y), lng: parseFloat(d[0].x) };
            coords[name] = c;
            resolve(c);
          } else resolve(null);
        });
      }
    });
  });
}

// ── TSP ──
function dist(a, b) {
  const R = 6371;
  const dLat = (b.lat-a.lat)*Math.PI/180;
  const dLng = (b.lng-a.lng)*Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(h));
}

function totalDist(arr) {
  let d = 0;
  for (let i = 0; i < arr.length-1; i++) d += dist(arr[i], arr[i+1]);
  return d;
}

function perms(arr) {
  if (arr.length <= 1) return [arr];
  const r = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = [...arr.slice(0,i),...arr.slice(i+1)];
    for (const p of perms(rest)) r.push([arr[i],...p]);
  }
  return r;
}

function solveTSP(startC, wpCs, endC, doReturn) {
  const idx = wpCs.map((_,i) => i);
  let best = null, bestD = Infinity;
  for (const perm of perms(idx)) {
    const route = [startC, ...perm.map(i => wpCs[i])];
    if (endC) route.push(endC);
    else if (doReturn) route.push(startC);
    const d = totalDist(route);
    if (d < bestD) { bestD = d; best = perm; }
  }
  return best;
}

// ── OPTIMIZE ──
let result = null;

async function optimize() {
  if (!kakaoReady) { alert('지도가 아직 로딩 중입니다. 잠시 후 다시 시도해주세요.'); return; }

  const startName = document.getElementById('fi-start').value.trim();
  const endName = document.getElementById('fi-end').value.trim();
  const wpNames = stops.map(s => s.name.trim()).filter(Boolean);

  if (!startName) { alert('출발지를 입력해주세요'); return; }
  if (wpNames.length < 1) { alert('경유지를 1개 이상 입력해주세요'); return; }

  document.getElementById('loading').classList.add('show');
  document.getElementById('loadingText').textContent = '장소 검색 중...';
  document.getElementById('btnGo').disabled = true;

  try {
    const startC = await getCoords(startName);
    if (!startC) { alert(`"${startName}"을(를) 찾을 수 없습니다. 더 구체적으로 입력해보세요.`); return; }

    const endC = endName ? await getCoords(endName) : null;
    const wpCsRaw = await Promise.all(wpNames.map(n => getCoords(n)));

    const validNames = [], validCs = [];
    wpNames.forEach((n, i) => { if (wpCsRaw[i]) { validNames.push(n); validCs.push(wpCsRaw[i]); } });

    if (!validCs.length) { alert('경유지를 찾을 수 없습니다.'); return; }

    document.getElementById('loadingText').textContent = '경로 최적화 중...';

    const bestPerm = solveTSP(startC, validCs, endC, opts.return);
    const ordNames = [startName, ...bestPerm.map(i => validNames[i])];
    const ordCs = [startC, ...bestPerm.map(i => validCs[i])];
    if (endC) { ordNames.push(endName); ordCs.push(endC); }
    else if (opts.return) { ordNames.push(startName); ordCs.push(startC); }

    const optD = totalDist(ordCs);
    const naiveCs = [startC, ...validCs];
    if (endC) naiveCs.push(endC); else if (opts.return) naiveCs.push(startC);
    const naiveD = totalDist(naiveCs);
    const savings = naiveD > 0 ? Math.round((1-optD/naiveD)*100) : 0;
    const speed = opts.traffic ? 28 : 40;
    const totalMin = Math.round((optD/speed)*60);

    result = { ordNames, ordCs, optD, savings, totalMin };
    drawMap(ordCs, ordNames);
    showResult(ordNames, ordCs, optD, savings, totalMin);

  } catch(e) {
    alert('오류: ' + e.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('btnGo').disabled = false;
  }
}

// ── DRAW MAP ──
function drawMap(cs, names) {
  markers.forEach(m => m.setMap(null)); markers = [];
  if (polyline) polyline.setMap(null);

  const kcs = cs.map(c => new kakao.maps.LatLng(c.lat, c.lng));

  polyline = new kakao.maps.Polyline({
    map: kakaoMap, path: kcs,
    strokeWeight: 5, strokeColor: '#f0b429', strokeOpacity: 0.9, strokeStyle: 'solid'
  });

  cs.forEach((c, i) => {
    const isS = i===0, isE = i===cs.length-1;
    const bg = isS ? '#3fb950' : isE ? '#ff6b6b' : '#58a6ff';
    const fc = isS ? '#000' : '#fff';
    const label = isS ? '출발' : isE ? '도착' : String(i);
    const content = `<div style="background:${bg};color:${fc};padding:4px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.4);font-family:sans-serif">${label}</div>`;
    const o = new kakao.maps.CustomOverlay({ map: kakaoMap, position: kcs[i], content, yAnchor: 1.6 });
    markers.push(o);
  });

  const bounds = new kakao.maps.LatLngBounds();
  kcs.forEach(c => bounds.extend(c));
  kakaoMap.setBounds(bounds);
  document.getElementById('mapEmpty').classList.add('hide');
  kakao.maps.event.addListener(kakaoMap, 'click', openMapFullscreen);
}

// ── RESULT ──
function showResult(names, cs, optD, savings, totalMin) {
  document.getElementById('saveBar').style.display = 'flex';
  document.getElementById('btnNavi2').style.display = 'flex';
  document.getElementById('bottom').style.display = 'none';
  document.getElementById('sStops').textContent = names.length - 1;
  document.getElementById('sDist').textContent = optD.toFixed(1) + 'km';
  document.getElementById('sTime').textContent = Math.floor(totalMin/60) + 'h' + (totalMin%60) + 'm';
  document.getElementById('sSave').textContent = savings + '%';
  document.getElementById('mapStats').classList.add('show');

  const c = document.getElementById('sheetSteps');
  c.innerHTML = '';
  names.forEach((name, i) => {
    const isS=i===0, isE=i===names.length-1;
    const segD = i>0 ? dist(cs[i-1],cs[i]).toFixed(1) : 0;
    const segM = i>0 ? Math.round(segD/(opts.traffic?28:40)*60) : 0;
    const div = document.createElement('div');
    div.className = 'rstep';
    div.innerHTML = `
      <div class="rl">
        <div class="rdot ${isS?'s':isE?'e':'m'}">${isS?'출':isE?'착':i}</div>
        ${!isE?'<div class="rline"></div>':''}
      </div>
      <div class="rc">
        <div class="rc-name">${name}</div>
        <div class="rc-meta">${i>0?`↑ ${segD}km · 약 ${segM}분`:'여기서 출발'}</div>
      </div>`;
    c.appendChild(div);
  });

  document.getElementById('saveVal').textContent = savings + '% 절약';
  document.getElementById('sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('bottom').style.display = '';
}

// ── 카카오내비 ──
function openKakaoNavi() {
  if (!result) return;
  const { ordNames, ordCs } = result;

  const destIdx = ordNames.length - 1;
  const destName = ordNames[destIdx];
  const destC = ordCs[destIdx];

  const viaPoints = [];
  for (let i = 1; i < destIdx; i++) {
    viaPoints.push({ name: ordNames[i], x: ordCs[i].lng, y: ordCs[i].lat });
  }

  if (!window.Kakao) { alert('카카오 SDK가 로드되지 않았습니다.'); return; }
  if (!Kakao.isInitialized()) {
    Kakao.init(KAKAO_KEY);
  }

  try {
    const naviParams = {
      name: destName,
      x: destC.lng,
      y: destC.lat,
      coordType: 'wgs84'
    };
    if (viaPoints.length > 0) {
      naviParams.viaPoints = viaPoints.map(p => ({ name: p.name, x: p.x, y: p.y }));
    }
    Kakao.Navi.start(naviParams);
  } catch(e) {
    alert('카카오내비 실행 실패: ' + e.message);
  }
}

// ── 지도 전체화면 ──
function openMapFullscreen() {
  if (!result) return;
  const mapEl = document.getElementById('map');
  mapEl.classList.add('fullscreen');
  setTimeout(() => kakaoMap.relayout(), 300);
}
function closeMapFullscreen() {
  const mapEl = document.getElementById('map');
  mapEl.classList.remove('fullscreen');
  setTimeout(() => kakaoMap.relayout(), 300);
}

window.onload = initApp;
</script>
